name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache tun2socks AAR
        id: aar-cache
        uses: actions/cache@v4
        with:
          path: |
            src/android/app/libs/tun2socks.aar
            src/android/app/libs/.tun2socks.version
          key: tun2socks-aar-${{ hashFiles('src/android/tun2socks.version') }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Extract version info from tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME}"          # v1.2.3
          VERSION="${TAG#v}"                # 1.2.3
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          # versionCode must be a positive integer that strictly increases
          # release over release. Using the tag's last segment as-is broke on
          # v1.0.0 (PATCH=0 -> versionCode 0, which Android rejects), and would
          # also produce duplicate/non-monotonic codes across minor/major bumps
          # (e.g. v0.9.5 and v1.0.5 would both be "5"). Encode all three
          # components instead, so ordering always matches semver ordering.
          BUILD=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "Tag=$TAG  Version=$VERSION  Build=$BUILD"

      - name: Decode release keystore
        id: keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [[ -n "$KEYSTORE_B64" ]]; then
            echo "$KEYSTORE_B64" | base64 --decode > src/android/release.jks
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Keystore decoded – building signed APK"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "KEYSTORE_BASE64 not set – building unsigned APK"
          fi

      - name: Build release APK
        env:
          PROXSOX_BUILD_TYPE: release
          PROXSOX_VERSION_NAME: ${{ steps.tag.outputs.version }}
          PROXSOX_VERSION_CODE: ${{ steps.tag.outputs.build }}
          PROXSOX_KEY_STORE: ${{ steps.keystore.outputs.available == 'true' && 'release.jks' || '' }}
          PROXSOX_KEY_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          PROXSOX_KEY_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          PROXSOX_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: src/android/build-scripts/build.sh

      - name: Remove keystore
        if: always()
        run: rm -f src/android/release.jks

      - name: Upload APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ProxSox ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
          files: src/android/app/build/outputs/apk/release/*.apk
